{% extends 'base.html' %}

{% block content %}
<h2>Educação</h2>
<form method="POST">
    <input type="number" step="0.01" name="nota1" placeholder="Nota N1" required>
    <input type="number" step="0.01" name="nota2" placeholder="Nota N2" required>
    <button type="submit">Calcular</button>
</form>
{% if media %}
<p>Media: {{ media }}</p>
<p>Status: {{ status }}</p>
 
{% endif %}
{% endblock %}
