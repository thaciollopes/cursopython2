{% extends 'base.html' %}

{% block content %}
<h2>Joias</h2>
<form method="POST">
    <input type="number" step="0.01" name="valor" placeholder="Valor inicial" required>
    <input type="number" step="0.01" name="percentual" placeholder="Percentual sem sinal %" required>
    <button type="submit">Calcular</button>
</form>
{% if resultado %}
<p>Valor final: R$ {{ "{:,.2f}".format(resultado).replace(",", "X").replace(".", ",").replace("X", ".") }}</p>
 
{% endif %}
{% endblock %}
